name: Friend Daily Market Digest

on:
  schedule:
    - cron: "59 12 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

concurrency:
  group: friend-daily-market-digest
  cancel-in-progress: true

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send friend daily digest
        working-directory: friend-stock-alert-tool
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py --config config.github-actions.json --daily-digest
